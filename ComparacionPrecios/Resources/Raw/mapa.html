<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>OpenStreetMap</title>

    <!-- Descargamos los estilos del mapa desde internet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* Esto hace que el mapa ocupe toda la pantalla del celular sin bordes */
        html, body, #contenedor-mapa {
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <!-- Aquí adentro se dibujará el mapa -->
    <div id="contenedor-mapa"></div>

    <!-- Descargamos el motor del mapa (Leaflet) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Inicializar el mapa centrado en coordenadas específicas (Latitud, Longitud) y Zoom 13
        var map = L.map('contenedor-mapa').setView([-0.1807, -78.4678], 13);

        // 2. Cargar las imágenes del mapa (los cuadritos de OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. Poner un marcador azul (chincheta) en el centro
        var marcador = L.marker([-0.1807, -78.4678]).addTo(map);
        marcador.bindPopup("<b>¡Mapa funcionando!</b><br>Este es OpenStreetMap sin API Keys.").openPopup();
    </script>
</body>
</html>
